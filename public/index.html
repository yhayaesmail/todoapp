<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real Todo App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-container">

    <!-- Auth Section -->
    <section id="authSection">
      <h2>Auth</h2>

      <!-- Tabs -->
      <div class="tabs">
        <button id="showLogin" class="tab active">Login</button>
        <button id="showRegister" class="tab">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form active">
        <input type="text" id="loginUsername" placeholder="Username" required/>
        <input type="password" id="loginPassword" placeholder="Password" required/>
        <button type="submit">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form hidden">
        <input type="text" id="regUsername" placeholder="Username" required/>
        <input type="email" id="regEmail" placeholder="Email" required/>
        <input type="password" id="regPassword" placeholder="Password" required/>
        <button type="submit">Register</button>
      </form>
    </section>

    <!-- Todo Section -->
    <section id="todoSection" class="hidden">
      <h1>Todo App</h1>
      <form id="todoForm">
        <input type="text" id="todoInput" placeholder="New Task..." required/>
        <button type="submit">Add</button>
      </form>
      <ul id="todoList"></ul>
      <button id="logoutBtn">Logout</button>
    </section>
  </div>

  <script>
    const API_URL = "http://localhost:3789"; 
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const todoForm = document.getElementById("todoForm");
    const todoList = document.getElementById("todoList");
    const authSection = document.getElementById("authSection");
    const todoSection = document.getElementById("todoSection");
    const logoutBtn = document.getElementById("logoutBtn");
    const showLoginBtn = document.getElementById("showLogin");
    const showRegisterBtn = document.getElementById("showRegister");

    // ===== Helper Functions =====
    function getToken() {
      return localStorage.getItem("token");
    }
    function setToken(token) {
      localStorage.setItem("token", token);
    }
    function clearToken() {
      localStorage.removeItem("token");
    }

    // ===== Switch between Login/Register =====
    showLoginBtn.addEventListener("click", () => {
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      showLoginBtn.classList.add("active");
      showRegisterBtn.classList.remove("active");
    });

    showRegisterBtn.addEventListener("click", () => {
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      showRegisterBtn.classList.add("active");
      showLoginBtn.classList.remove("active");
    });

    // ===== Auth =====
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("loginUsername").value;
      const password = document.getElementById("loginPassword").value;

      const res = await fetch(`${API_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.token) {
        setToken(data.token);
        authSection.classList.add("hidden");
        todoSection.classList.remove("hidden");
        loadTodos();
      } else {
        alert("Login failed");
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("regUsername").value;
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;

      const res = await fetch(`${API_URL}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();
      if (data.token) {
        setToken(data.token);
        authSection.classList.add("hidden");
        todoSection.classList.remove("hidden");
        loadTodos();
      } else if (data.message) {
        alert(data.message);
      }
    });

    // ===== Todos =====
    async function loadTodos() {
      const res = await fetch(`${API_URL}/todos`, {
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      const todos = await res.json();
      renderTodos(todos);
    }

    function renderTodos(todos) {
      todoList.innerHTML = "";
      todos.forEach(todo => {
        const li = document.createElement("li");
        li.textContent = todo.task; // تم تصحيح الحقل
        if (todo.completed) li.style.textDecoration = "line-through";

        // Toggle complete
        li.addEventListener("click", async () => {
          await fetch(`${API_URL}/todos/${todo.id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${getToken()}`
            },
            body: JSON.stringify({ completed: !todo.completed })
          });
          loadTodos();
        });

        // Delete button
        const delBtn = document.createElement("button");
        delBtn.textContent = "❌";
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          await fetch(`${API_URL}/todos/${todo.id}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${getToken()}` }
          });
          loadTodos();
        });

        li.appendChild(delBtn);
        todoList.appendChild(li);
      });
    }

    todoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const task = document.getElementById("todoInput").value;

      await fetch(`${API_URL}/todos`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${getToken()}`
        },
        body: JSON.stringify({ task }) // تم تعديل الحقل
      });

      document.getElementById("todoInput").value = "";
      loadTodos();
    });

    // ===== Logout =====
    logoutBtn.addEventListener("click", () => {
      clearToken();
      authSection.classList.remove("hidden");
      todoSection.classList.add("hidden");
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      showLoginBtn.classList.add("active");
      showRegisterBtn.classList.remove("active");
    });

    // ===== Auto-login if token exists =====
    if (getToken()) {
      authSection.classList.add("hidden");
      todoSection.classList.remove("hidden");
      loadTodos();
    }
  </script>
</body>
</html>
